# Pipeline de déploiement automatique vers l'hébergement IONOS.
# Déclenché à chaque "git push" sur la branche main.
#
# Secrets requis (GitHub → Settings → Secrets → Actions) :
# IONOS_HOST     : hostaccess997389426.webspace-data.io
# IONOS_USER     : u115594766
# IONOS_PASSWORD : votre mot de passe SSH IONOS
# IONOS_PORT     : 22

name: Deploy to IONOS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (Next.js static export → ./out/)
        run: npm run build

      - name: Deploy via SFTP to IONOS
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.IONOS_HOST }}
          username: ${{ secrets.IONOS_USER }}
          password: ${{ secrets.IONOS_PASSWORD }}
          port: ${{ secrets.IONOS_PORT }}
          local_path: './out/*'
          remote_path: '/'
          sftp_only: true
          delete_remote_files: false

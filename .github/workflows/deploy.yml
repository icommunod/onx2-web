# Pipeline définitif : GitHub → IONOS via rsync/SSH
# Host    : access997389426.webspace-data.io (port 22)
# User    : u115594766
# Webroot : /homepages/29/d997389426/htdocs
#
# Secrets GitHub : IONOS_HOST, IONOS_USER, IONOS_PASSWORD, IONOS_WEBROOT

name: Deploy to IONOS

on:
  push:
    branches:
      - main      # → Production (onx2.fr)
      - develop   # → Préprod   (onx2.eu)
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environnement cible'
        required: true
        default: 'preprod'
        type: choice
        options: [production, preprod]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install & Build
        run: npm ci && npm run build
        env:
          NEXT_PUBLIC_ENV: ${{ github.ref == 'refs/heads/main' && 'production' || 'preprod' }}
          NEXT_PUBLIC_SITE_URL: ${{ github.ref == 'refs/heads/main' && 'https://onx2.fr' || 'https://onx2.eu' }}

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Deploy via rsync/SSH to IONOS
        run: |
          sshpass -p "${{ secrets.IONOS_PASSWORD }}" rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 -p 22" \
            ./out/ \
            ${{ secrets.IONOS_USER }}@${{ secrets.IONOS_HOST }}:${{ secrets.IONOS_WEBROOT }}/

      - name: Verify & Summary
        run: |
          DOMAIN=${{ github.ref == 'refs/heads/main' && 'onx2.fr' || 'onx2.eu' }}
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://$DOMAIN/ || echo "000")
          echo "## ✅ Deploy → https://$DOMAIN/ (HTTP $STATUS)" >> $GITHUB_STEP_SUMMARY
          echo "Branche: ${{ github.ref_name }} | Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

# Pipeline de déploiement automatique vers l'hébergement IONOS.
# Secrets requis : IONOS_HOST, IONOS_USER, IONOS_PASSWORD, IONOS_PORT

name: Deploy to IONOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install & Build
        run: npm ci && npm run build

      - name: Deploy via SFTP (lftp)
        env:
          IONOS_HOST: ${{ secrets.IONOS_HOST }}
          IONOS_USER: ${{ secrets.IONOS_USER }}
          IONOS_PASSWORD: ${{ secrets.IONOS_PASSWORD }}
          IONOS_PORT: ${{ secrets.IONOS_PORT }}
        run: |
          sudo apt-get install -y lftp
          lftp -c "
            set sftp:connect-program 'ssh -a -x -p $IONOS_PORT -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null';
            set net:timeout 30;
            set net:max-retries 3;
            open sftp://$IONOS_USER:$IONOS_PASSWORD@$IONOS_HOST;
            mirror -R --delete --verbose ./out/ /;
            bye
          "

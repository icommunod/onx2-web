# Pipeline de déploiement automatique vers l'hébergement IONOS.
# Déclenché à chaque "git push" sur la branche main.
#
# Pré-requis : dans GitHub -> Settings -> Secrets and variables -> Actions,
# créez les 4 secrets : IONOS_HOST, IONOS_USER, IONOS_PASSWORD, IONOS_PORT.

name: Deploy to IONOS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (Next.js static export → ./out/)
        run: npm run build

      - name: Deploy via FTPS to IONOS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.IONOS_HOST }}
          username: ${{ secrets.IONOS_USER }}
          password: ${{ secrets.IONOS_PASSWORD }}
          port: ${{ secrets.IONOS_PORT }}
          protocol: ftps
          local-dir: ./out/
          server-dir: /
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**

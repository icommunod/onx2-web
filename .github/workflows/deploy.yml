# Pipeline de déploiement automatique vers l'hébergement IONOS.
#
# Secrets requis (GitHub → Settings → Secrets → Actions) :
# IONOS_HOST     : adresse IP ou hostname FTP depuis panel IONOS → Hébergement → Accès FTP
# IONOS_USER     : u115594766
# IONOS_PASSWORD : votre mot de passe
# IONOS_PORT     : 22 (SFTP) ou 21 (FTP)

name: Deploy to IONOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install & Build
        run: npm ci && npm run build

      # ── Option A : SFTP (port 22) — décommenter si le hostname SSH résout ──
      # - name: Deploy via SFTP
      #   uses: appleboy/scp-action@v0.1.7
      #   with:
      #     host: ${{ secrets.IONOS_HOST }}
      #     username: ${{ secrets.IONOS_USER }}
      #     password: ${{ secrets.IONOS_PASSWORD }}
      #     port: 22
      #     source: "out/*"
      #     target: "/"
      #     strip_components: 1

      # ── Option B : FTPS (port 21) — protocole standard IONOS webspace ──
      - name: Deploy via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.IONOS_HOST }}
          username: ${{ secrets.IONOS_USER }}
          password: ${{ secrets.IONOS_PASSWORD }}
          port: 21
          protocol: ftps
          local-dir: ./out/
          server-dir: /
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
